<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — NetWorthCast</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-96.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f5f2;--txt:#1c1917;--mut:#8c857d;--acc:#2563eb;--fn:'Outfit',sans-serif;--mo:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fn);color:var(--txt);background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px 20px;max-width:520px}
.code{font-size:120px;font-weight:800;font-family:var(--mo);color:#e5e2dc;line-height:1}
h1{font-size:24px;font-weight:700;margin:12px 0 8px}
p{color:var(--mut);margin-bottom:24px;line-height:1.6}
.links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px}
.links a{display:inline-block;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;transition:background .15s}
.links a.primary{background:var(--acc);color:#fff}
.links a.primary:hover{background:#1d4ed8}
.links a.secondary{background:#fff;color:var(--txt);border:1px solid #e5e2dc}
.links a.secondary:hover{border-color:var(--acc);color:var(--acc)}
header{position:absolute;top:20px;left:20px;display:flex;align-items:center;gap:8px}
header a{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit}
.logo{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#2563eb,#059669);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px}
.brand{font-weight:800;font-size:17px;letter-spacing:-.5px}
</style>
</head>
<body>
<header>
  <a href="/">
    <div class="logo">N</div>
    <span class="brand">NetWorthCast</span>
  </a>
</header>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Try one of these instead:</p>
  <div class="links">
    <a href="/" class="primary">Open NetWorthCast</a>
    <a href="/fire-calculator" class="secondary">FIRE Calculator</a>
    <a href="/net-worth-calculator" class="secondary">Net Worth Calculator</a>
    <a href="/cost-of-living-comparison" class="secondary">Cost of Living</a>
    <a href="/net-worth-forecast" class="secondary">Forecast</a>
    <a href="/where-to-live" class="secondary">Where to Live</a>
  </div>
</div>
</body>
</html>
